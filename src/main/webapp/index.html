<!DOCTYPE html>
<html>
<head>
    <title>Prime Number Checker</title>
    <style>
        .container {
            margin: 50px auto;
            padding: 20px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        input {
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Prime Number Checker</h2>
        <form action="prime" method="post">
            Enter a number:
            <input type="number" name="number" required>
            <br>
            <input type="submit" value="Check">
        </form>
    </div>
</body>
</html>
